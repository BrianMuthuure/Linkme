[tool.ruff]
target-version = "py313"
line-length = 88

# Exclude common non-source directories
exclude = [
    ".git",
    ".ruff_cache",
    "__pycache__",
    "*/migrations/*",
    "venv",
    "manage.py",
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "UP",   # pyupgrade
    "DJ",   # flake8-django
]
ignore = [
    "E501",  # line too long (handled by formatter)
]

[tool.ruff.lint.isort]
known-first-party = ["apps", "linkme"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
